databases:
  - name: agripilot-db
    plan: free
    databaseName: agripilot
    user: agripilot

services:
  - type: web
    plan: free
    name: agripilot
    runtime: node
    region: oregon
    env: node
    buildCommand: npm ci --include=dev && npx vite build && cd server && npm ci && npx prisma generate
    startCommand: cd server && npx prisma db push --skip-generate --accept-data-loss && node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: agripilot-db
          property: connectionString

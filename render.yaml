databases:
  - name: agripilot-db
    plan: free
    databaseName: agripilot
    user: agripilot

services:
  - type: web
    plan: free
    name: agripilot
    runtime: node
    buildCommand: npm ci && cd server && npm ci && npx prisma generate && cd .. && npx vite build
    startCommand: cd server && npx prisma db push --skip-generate && node prisma/seed.js; node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: DATABASE_URL
        fromDatabase:
          name: agripilot-db
          property: connectionString

databases:
  - name: farroway-db
    plan: free
    databaseName: farroway
    user: farroway

services:
  - type: web
    plan: free
    name: farroway
    runtime: node
    region: oregon
    env: node
    buildCommand: npm ci --include=dev && npx vite build && cd server && npm ci && npx prisma generate
    startCommand: cd server && npx prisma migrate deploy && node src/server.js
    healthCheckPath: /api/health
    # Persistent disk for evidence file uploads (requires paid plan)
    # disk:
    #   name: farroway-uploads
    #   mountPath: /app/server/uploads
    #   sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
      - key: CORS_ORIGIN
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: farroway-db
          property: connectionString

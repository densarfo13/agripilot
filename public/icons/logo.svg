<?xml version="1.0" encoding="UTF-8"?>
<!--
  Farroway logo — 512x512 reference asset (v5, April 2026).

  Aligned with the canonical leaf-arrow mark (see
  src/components/FarrowayLogo.jsx and
  public/icons/farroway-mark.svg). Same composition scaled
  for the larger viewBox so raster generators
  (scripts/generate-icons.js) produce a consistent app-icon
  set at 192/512/1024.

  Composition:
    1. Vertical pointed-oval leaf, dark-green stroke around a
       brand-green fill.
    2. Solid white upward arrow painted on top.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     role="img"
     aria-label="Farroway">
  <title>Farroway</title>

  <!-- Leaf body. -->
  <path d="M 256 31
           Q 92 92, 61 266
           Q 92 451, 256 492
           Q 420 451, 451 266
           Q 420 92, 256 31 Z"
        fill="#22C55E"
        stroke="#15803D"
        stroke-width="26"
        stroke-linejoin="round" />

  <!-- White upward arrow. -->
  <path d="M 133 399
           L 184 328
           L 307 154
           L 287 133
           L 410 82
           L 358 205
           L 338 184
           L 215 358
           L 164 430 Z"
        fill="#FFFFFF"
        stroke="#FFFFFF"
        stroke-width="5"
        stroke-linejoin="round" />
</svg>

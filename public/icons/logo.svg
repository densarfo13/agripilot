<?xml version="1.0" encoding="UTF-8"?>
<!--
  Farroway logo — 512x512 reference asset.

  Aligned with the canonical leaf-arrow mark (see
  src/components/FarrowayLogo.jsx and
  public/icons/farroway-mark.svg). The previous shield-and-
  furrow shape was an unreferenced legacy asset; this file
  is now the same mark, scaled for the larger viewBox so
  raster generators (scripts/generate-icons.js) produce a
  consistent app-icon set.

  Composition (top → bottom inside the leaf silhouette):
    1. lighter green band at the upper-right tip (#A3E635)
    2. medium green main body (#22C55E)
    3. navy wedge in the lower-left (#0B1220)
    4. two-tone curved arrow piercing through the leaf
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     role="img"
     aria-label="Farroway">
  <title>Farroway</title>

  <defs>
    <clipPath id="leafClip">
      <path d="M 451 72
               Q 358 31, 246 61
               Q 113 113, 51 256
               Q 20 410, 143 461
               Q 256 471, 338 389
               Q 420 287, 451 72 Z" />
    </clipPath>
    <clipPath id="navyZone">
      <polygon points="-51,471 563,256 563,614 -51,614" />
    </clipPath>
    <clipPath id="greenZone">
      <polygon points="-51,-102 563,-102 563,256 -51,471" />
    </clipPath>
  </defs>

  <g clip-path="url(#leafClip)">
    <!-- 1. medium green base -->
    <rect x="0" y="0" width="512" height="512" fill="#22C55E" />

    <!-- 2. lighter green band at the upper-right -->
    <polygon points="-51,-102 563,-102 563,31 -51,164" fill="#A3E635" />

    <!-- 3. navy wedge in the lower-left -->
    <polygon points="-51,471 563,256 563,614 -51,614" fill="#0B1220" />
  </g>

  <!-- Arrow shaft drawn twice with two clip regions so the
       segment over the navy wedge is white and the segment
       over the green is navy. -->
  <g clip-path="url(#navyZone)">
    <path d="M 123 379 Q 225 307, 399 113"
          stroke="#FFFFFF"
          stroke-width="16.4"
          stroke-linecap="round"
          fill="none" />
  </g>
  <g clip-path="url(#greenZone)">
    <path d="M 123 379 Q 225 307, 399 113"
          stroke="#0B1220"
          stroke-width="16.4"
          stroke-linecap="round"
          fill="none" />
  </g>

  <!-- Arrowhead at the upper-right tip -->
  <polygon points="410,92 338,113 369,154"
           fill="#0B1220"
           stroke="#0B1220"
           stroke-width="3"
           stroke-linejoin="round" />
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  Farroway brand mark — v4 (April 2026 brand sheet).

  Standalone vector copy of the leaf-arrow mark drawn inline by
  src/components/FarrowayLogo.jsx — kept in sync by hand. Used
  by browsers that prefer an SVG icon (rel="icon"
  type="image/svg+xml") and as the transparent source asset for
  any PWA / app-icon raster export.

  Composition:
    1. Leaf silhouette filled brand green (#22C55E).
    2. Curved upward arrow (shaft + head) cut out of the leaf as
       NEGATIVE SPACE via an SVG <mask>. The cutout reveals the
       surface behind the SVG, so the mark works on dark navy
       AND white tiles without alteration.
    3. Subtle leaf-vein highlight in lighter green (#A3E635)
       running along the arrow shaft.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     role="img"
     aria-label="Farroway">
  <title>Farroway</title>

  <defs>
    <mask id="arrowCutout" maskUnits="userSpaceOnUse"
          x="0" y="0" width="100" height="100">
      <rect x="0" y="0" width="100" height="100" fill="white" />
      <path d="M 28 72 Q 46 56, 76 22"
            stroke="black"
            stroke-width="9"
            stroke-linecap="round"
            fill="none" />
      <polygon points="78,18 60,22 68,34"
               fill="black"
               stroke="black"
               stroke-width="2"
               stroke-linejoin="round" />
    </mask>
  </defs>

  <!-- Leaf body — single brand-green fill, masked so the arrow
       cuts through to whatever sits behind the SVG. -->
  <path d="M 86 14
           Q 66 6, 44 14
           Q 20 24, 10 48
           Q 4 78, 28 90
           Q 50 92, 66 76
           Q 82 54, 86 14 Z"
        fill="#22C55E"
        mask="url(#arrowCutout)" />

  <!-- Lighter-green vein accent along the arrow shaft. -->
  <path d="M 30 78 Q 48 60, 80 20"
        stroke="#A3E635"
        stroke-width="1.4"
        stroke-linecap="round"
        fill="none"
        opacity="0.55" />
</svg>

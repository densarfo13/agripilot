<?xml version="1.0" encoding="UTF-8"?>
<!--
  Farroway brand mark — v5 (April 2026 brand sheet, exact match).

  Standalone vector copy of the leaf-arrow mark drawn inline by
  src/components/FarrowayLogo.jsx — kept in sync by hand.

  Composition:
    1. Vertical pointed-oval leaf, dark-green stroke (#15803D)
       around a brand-green fill (#22C55E).
    2. Solid white upward arrow painted on top of the leaf body
       (shaft + triangular head), pointing up-and-to-the-right.

  The mark is self-contained — the dark-green outline keeps it
  defined on light pages, and the bright fill keeps it defined
  on dark dashboards, so no recolouring is needed for either
  surface context.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     role="img"
     aria-label="Farroway">
  <title>Farroway</title>

  <!-- Leaf body — bright green fill, dark-green outline. -->
  <path d="M 50 6
           Q 18 18, 12 52
           Q 18 88, 50 96
           Q 82 88, 88 52
           Q 82 18, 50 6 Z"
        fill="#22C55E"
        stroke="#15803D"
        stroke-width="5"
        stroke-linejoin="round" />

  <!-- White upward arrow on top of the leaf. -->
  <path d="M 26 78
           L 36 64
           L 60 30
           L 56 26
           L 80 16
           L 70 40
           L 66 36
           L 42 70
           L 32 84 Z"
        fill="#FFFFFF"
        stroke="#FFFFFF"
        stroke-width="1"
        stroke-linejoin="round" />
</svg>

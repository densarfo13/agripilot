<?xml version="1.0" encoding="UTF-8"?>
<!--
  Farroway brand mark — v8 (April 2026).

  Three-zone leaf with dark navy veins + curved arrow.

  If you have the canonical brand-asset SVG/PNG, drop it in at
  this path to override this redraw — FarrowayLogo.jsx ships
  with header documentation showing how to switch the inline
  SVG to <img src="/icons/farroway-mark.svg">.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     role="img"
     aria-label="Farroway">
  <title>Farroway</title>

  <defs>
    <clipPath id="leafClip">
      <path d="M 28 22
               Q 50 14, 82 18
               L 84 22
               Q 90 48, 80 70
               L 60 92
               L 42 80
               Q 22 62, 18 44
               Q 22 28, 28 22 Z" />
    </clipPath>
  </defs>

  <g clip-path="url(#leafClip)">
    <!-- Bottom: white -->
    <rect x="0" y="0" width="100" height="100" fill="#FFFFFF" />
    <!-- Middle: medium green over upper two thirds -->
    <path d="M 0 0 L 100 0 L 100 60 Q 54 66, 24 72 L 0 72 Z"
          fill="#22C55E" />
    <!-- Top: bright lime green over upper third -->
    <path d="M 0 0 L 100 0 L 100 34 Q 54 40, 22 52 L 0 52 Z"
          fill="#A3E635" />
  </g>

  <!-- Vein strokes -->
  <g clip-path="url(#leafClip)">
    <path d="M 24 50 Q 54 38, 84 32"
          fill="none" stroke="#0B1220"
          stroke-width="3" stroke-linecap="round" />
    <path d="M 30 70 Q 54 64, 78 58"
          fill="none" stroke="#0B1220"
          stroke-width="3" stroke-linecap="round" />
  </g>

  <!-- Outer leaf outline -->
  <path d="M 28 22
           Q 50 14, 82 18
           L 84 22
           Q 90 48, 80 70
           L 60 92
           L 42 80
           Q 22 62, 18 44
           Q 22 28, 28 22 Z"
        fill="none" stroke="#15803D"
        stroke-width="2.5" stroke-linejoin="round" />

  <!-- Curved arrow shaft + chevron head -->
  <path d="M 28 42 Q 56 30, 76 26"
        fill="none" stroke="#0B1220"
        stroke-width="3.4" stroke-linecap="round" />
  <polygon points="80,22 64,24 70,32"
           fill="#0B1220" stroke="#0B1220"
           stroke-width="0.6" stroke-linejoin="round" />
</svg>

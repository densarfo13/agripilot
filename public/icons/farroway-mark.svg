<?xml version="1.0" encoding="UTF-8"?>
<!--
  Farroway brand mark — v7 (April 2026 brand asset).

  If you have the canonical brand-asset file, drop it in at this
  path to replace this redraw. The FarrowayLogo component will
  pick it up via the existing wiring.

  Composition:
    1. Vertical pointed-oval leaf with a dark-green outline.
    2. Bright brand-green fill + faint lighter-green highlight
       along the upper edge.
    3. White triangular wedge cutting into the lower portion.
    4. Solid dark-navy chevron arrow painted on top.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     role="img"
     aria-label="Farroway">
  <title>Farroway</title>

  <defs>
    <clipPath id="leafClip">
      <path d="M 50 6
               Q 22 14, 14 46
               Q 12 82, 50 94
               Q 88 82, 86 46
               Q 78 14, 50 6 Z" />
    </clipPath>
  </defs>

  <!-- Dark-green outline. -->
  <path d="M 50 6
           Q 22 14, 14 46
           Q 12 82, 50 94
           Q 88 82, 86 46
           Q 78 14, 50 6 Z"
        fill="none"
        stroke="#15803D"
        stroke-width="5"
        stroke-linejoin="round" />

  <g clip-path="url(#leafClip)">
    <!-- Bright green base. -->
    <rect x="0" y="0" width="100" height="100" fill="#22C55E" />
    <!-- Faint lighter-green highlight along the upper edge. -->
    <polygon points="-10,-10 110,-10 110,8 -10,28"
             fill="#A3E635" opacity="0.55" />
    <!-- White wedge cutting into the lower portion. -->
    <polygon points="-10,84 110,50 110,120 -10,120" fill="#FFFFFF" />
  </g>

  <!-- Solid dark-navy chevron arrow. -->
  <polygon
    points="78,16 60,18 70,28 34,66 24,76 30,82 40,72 76,34 66,38"
    fill="#0B1220"
    stroke="#0B1220"
    stroke-width="0.6"
    stroke-linejoin="round" />
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  Farroway brand mark.

  Standalone vector copy of the leaf-shape arrow-path mark
  drawn inline by src/components/FarrowayLogo.jsx — kept in
  sync by hand. Used by browsers that prefer an SVG icon
  (rel="icon" type="image/svg+xml") and as a transparent
  source asset for any PWA / app-icon raster export.

  Composition (top → bottom inside the leaf silhouette):
    1. lighter green band at the upper-right tip (#A3E635)
    2. medium green main body (#22C55E)
    3. navy wedge in the lower-left (#0B1220)
    4. two-tone curved arrow piercing through the leaf:
       navy over the green, white over the navy wedge,
       small triangular arrowhead at the upper-right.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 100 100"
     role="img"
     aria-label="Farroway">
  <title>Farroway</title>

  <defs>
    <clipPath id="leafClip">
      <path d="M 88 14
               Q 70 6, 48 12
               Q 22 22, 10 50
               Q 4 80, 28 90
               Q 50 92, 66 76
               Q 82 56, 88 14 Z" />
    </clipPath>
    <clipPath id="navyZone">
      <polygon points="-10,92 110,50 110,120 -10,120" />
    </clipPath>
    <clipPath id="greenZone">
      <polygon points="-10,-20 110,-20 110,50 -10,92" />
    </clipPath>
  </defs>

  <g clip-path="url(#leafClip)">
    <!-- 1. medium green base -->
    <rect x="0" y="0" width="100" height="100" fill="#22C55E" />

    <!-- 2. lighter green band at the upper-right -->
    <polygon points="-10,-20 110,-20 110,6 -10,32" fill="#A3E635" />

    <!-- 3. navy wedge in the lower-left -->
    <polygon points="-10,92 110,50 110,120 -10,120" fill="#0B1220" />
  </g>

  <!-- Arrow shaft — drawn twice so the segment over the navy
       wedge is white and the segment over the green is navy. -->
  <g clip-path="url(#navyZone)">
    <path d="M 24 74 Q 44 60, 78 22"
          stroke="#FFFFFF"
          stroke-width="3.2"
          stroke-linecap="round"
          fill="none" />
  </g>
  <g clip-path="url(#greenZone)">
    <path d="M 24 74 Q 44 60, 78 22"
          stroke="#0B1220"
          stroke-width="3.2"
          stroke-linecap="round"
          fill="none" />
  </g>

  <!-- Arrowhead at the upper-right tip -->
  <polygon points="80,18 66,22 72,30"
           fill="#0B1220"
           stroke="#0B1220"
           stroke-width="0.6"
           stroke-linejoin="round" />
</svg>

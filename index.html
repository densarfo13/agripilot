<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farroway</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (Android status bar + PWA chrome) -->
    <meta name="theme-color" content="#0F172A" />

    <!-- Favicons & app icons \u2014 every brand asset resolves to
         the logo-premium.* family. The brand team supplied the
         premium logo as a 1080\u00D71080 JPG; the size variants
         below all share the same JPG (browsers downscale on
         render). When a vector SVG arrives, swap these to .svg
         and redeploy.
           logo-premium.jpg       \u2014 raster master + og:image
           logo-premium-1024.jpg  \u2014 PWA + Windows tile
           logo-premium-512.jpg   \u2014 PWA install + maskable
           logo-premium-192.jpg   \u2014 Android home-screen
           logo-premium-180.jpg   \u2014 iOS apple-touch-icon
           logo-premium.svg       \u2014 (future) vector master -->
    <link rel="icon" type="image/jpeg" href="/icons/logo-premium.jpg" />
    <link rel="icon" type="image/jpeg" sizes="192x192" href="/icons/logo-premium-192.jpg" />
    <link rel="mask-icon" href="/icons/logo-premium.jpg" color="#0B1220" />

    <!-- Apple iOS PWA tags. The 180x180 .jpg is the canonical
         apple-touch-icon; the unsized fallback below picks the
         same file so older Safari versions get the same mark. -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/logo-premium-180.jpg" />
    <link rel="apple-touch-icon" href="/icons/logo-premium-180.jpg" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Modern equivalent of the deprecated apple-* meta — silences
         Chrome's deprecation warning while keeping iOS PWA support. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Farroway" />

    <!-- Open Graph / Twitter share previews. When a Farroway
         link is pasted into chat or social feeds, the JPG is
         what partners and farmers see in the link card. -->
    <meta property="og:title" content="Farroway" />
    <meta property="og:description" content="Know what to do. Grow better." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/logo-premium-1024.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Farroway" />
    <meta name="twitter:description" content="Know what to do. Grow better." />
    <meta name="twitter:image" content="/icons/logo-premium-1024.jpg" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Devanagari (Hindi) font — loaded via stylesheet so it's
         available immediately when html[lang="hi"] is set. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register service worker for PWA (web only, not native Capacitor) -->
    <script>
      if ('serviceWorker' in navigator && !window.Capacitor) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>

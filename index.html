<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Farroway</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Theme color (Android status bar + PWA chrome) -->
    <meta name="theme-color" content="#0F172A" />

    <!-- Standard favicon / icons.
         The SVG is the single source of truth — vector, scales
         perfectly, served by the unconditional static mount in
         server/src/app.js so it cannot 404 even on a stale
         deploy. The previous PNG <link rel="icon"> was removed
         because some deploys don't have the rasterised file
         and Chrome was logging a 404 in the network panel
         even though the SVG worked. -->
    <link rel="icon" type="image/svg+xml" href="/icons/farroway-mark.svg" />
    <!-- Pinned-tab / mask icon for Safari macOS (renders as a
         single-colour silhouette using the navy brand colour). -->
    <link rel="mask-icon" href="/icons/farroway-mark.svg" color="#0B1220" />

    <!-- Apple iOS PWA tags -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- Modern equivalent of the deprecated apple-* meta — silences
         Chrome's deprecation warning while keeping iOS PWA support. -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Farroway" />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Devanagari (Hindi) font — loaded via stylesheet so it's
         available immediately when html[lang="hi"] is set. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register service worker for PWA (web only, not native Capacitor) -->
    <script>
      if ('serviceWorker' in navigator && !window.Capacitor) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>

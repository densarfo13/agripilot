name: production-safety

# Runs on every push/PR. Blocks deploys when any of the production-
# safety guards fail. Keep this workflow FAST (< 3 min) — the gating
# value is immediate feedback, not a full E2E suite.

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  guards:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Guards have no dependencies; they're pure Node scripts.
      - name: CI guard - prisma safety
        run: node scripts/ci/check-prisma-safety.mjs

      - name: CI guard - crop-type drift
        run: node scripts/ci/check-crop-type-drift.mjs

      - name: CI guard - i18n coverage (Hindi)
        run: node scripts/ci/check-i18n-coverage.mjs

      - name: CI guard - duplicate crop sources
        run: node scripts/ci/check-duplicate-crop-sources.mjs

      # Env assertions — tolerate optional-provider warnings; fail only
      # on missing REQUIRED backend/frontend vars. In CI we're checking
      # the script itself parses; real env is enforced at deploy time.
      - name: CI guard - env assertions (dev mode)
        run: node scripts/ci/check-env-assertions.mjs --mode=dev

  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: guards

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          cd server && npm ci

      - name: Production-safety test suite
        working-directory: server
        run: |
          npx vitest run \
            src/__tests__/productionSafety.test.js \
            src/__tests__/cropEngine.test.js \
            src/__tests__/topCropEngine.test.js \
            src/__tests__/seasonalCropEngine.test.js \
            src/__tests__/rainfallFitEngine.test.js \
            src/__tests__/farmEconomicsEngine.test.js \
            src/__tests__/insightEngine.test.js \
            src/__tests__/insightNotificationAdapter.test.js \
            src/__tests__/channelRouting.test.js

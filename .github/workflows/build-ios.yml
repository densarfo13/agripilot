name: Build iOS App

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Build frontend
        run: ./node_modules/.bin/vite build

      - name: Sync iOS
        run: ./node_modules/.bin/cap sync ios

      - name: Select Xcode version
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Resolve Swift packages
        run: |
          cd ios/App
          xcodebuild -resolvePackageDependencies \
            -project App.xcodeproj \
            -scheme App

      - name: Build iOS app (unsigned)
        run: |
          cd ios/App
          xcodebuild -project App.xcodeproj \
            -scheme App \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -30

      - name: Package .app into zip
        run: |
          cd ios/App/build/Build/Products/Debug-iphonesimulator
          zip -r AgriPilot-simulator.zip App.app
          ls -la AgriPilot-simulator.zip

      - name: Upload iOS build artifact
        uses: actions/upload-artifact@v4
        with:
          name: AgriPilot-iOS-Simulator
          path: ios/App/build/Build/Products/Debug-iphonesimulator/AgriPilot-simulator.zip
          retention-days: 30

  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Build frontend
        run: ./node_modules/.bin/vite build

      - name: Sync Android
        run: ./node_modules/.bin/cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: AgriPilot-Android
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
